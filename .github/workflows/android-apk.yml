name: Android APK Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'examples/llama.android/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'examples/llama.android/**'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: false

      - name: Create gradle.properties
        run: |
          cat > examples/llama.android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          android.native.buildOutput=verbose
          EOF

      - name: Make gradlew executable
        run: chmod +x examples/llama.android/gradlew

      - name: Build Debug APK
        run: |
          cd examples/llama.android
          ./gradlew assembleDebug --no-daemon --stacktrace --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arm-ai-chat-debug
          path: examples/llama.android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-${{ github.sha }}
          name: Android Build ${{ github.run_number }}
          files: examples/llama.android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
